<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Glow -->
  <circle cx="100" cy="100" r="60" fill="url(#aiGrad)" opacity="0.3" filter="url(#glow)"/>
  <!-- Spark Shape -->
  <path d="M100 20 C100 80, 120 100, 180 100 C120 100, 100 120, 100 180 C100 120, 80 100, 20 100 C80 100, 100 80, 100 20 Z" fill="url(#aiGrad)"/>
  <circle cx="100" cy="100" r="16" fill="#FFFFFF"/>
</svg>
